<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VCF Rosetta</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header>
    <div class="head-row">
      <h1 id="title">VCF Rosetta</h1>
      <label class="lang"><span id="lang-label">语言</span>
        <select id="lang">
          <option value="zh-CN">简体中文</option>
          <option value="de">Deutsch</option>
        </select>
      </label>
    </div>
    <span class="sub" id="subtitle"></span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="overview"></button>
    <button class="tab" data-tab="tasks"></button>
    <button class="tab" data-tab="alarms"></button>
    <button class="tab" data-tab="glossary"></button>
  </nav>

  <section id="tab-overview" class="panel">
    <div id="overview-cards" class="cards"></div>
    <p id="overview-note" class="note"></p>
  </section>

  <section id="tab-tasks" class="panel hidden">
    <div id="tasks-box"></div>
    <p id="tasks-note" class="note"></p>
  </section>

  <section id="tab-alarms" class="panel hidden">
    <input id="alarm-search" class="search" type="search" />
    <div id="alarm-list"></div>
  </section>

  <section id="tab-glossary" class="panel hidden">
    <input id="glossary-search" class="search" type="search" />
    <div id="glossary-meta" class="meta"></div>
    <table class="grid"><tbody id="glossary-rows"></tbody></table>
  </section>

  <script src="vc-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
