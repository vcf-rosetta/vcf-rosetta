<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16d07a"/>
      <stop offset="0.55" stop-color="#0bbf8e"/>
      <stop offset="1" stop-color="#0aa6e6"/>
    </linearGradient>
  </defs>

  <!-- vivid badge -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#bg)"/>

  <!-- VCF — dominant wordmark -->
  <text x="64" y="66" font-family="'Helvetica Neue',Arial,sans-serif" font-size="54" font-weight="800"
        fill="#ffffff" letter-spacing="1" text-anchor="middle">VCF</text>

  <!-- multilingual tag: globe + representative scripts (Latin / 文 / 한) in a bright pill -->
  <rect x="16" y="84" width="96" height="28" rx="14" fill="#ffffff"/>
  <g stroke="#0a9a63" stroke-width="2.2" fill="none">
    <circle cx="34" cy="98" r="10.5"/>
    <ellipse cx="34" cy="98" rx="4.3" ry="10.5"/>
    <line x1="23.5" y1="98" x2="44.5" y2="98"/>
    <line x1="26" y1="91.5" x2="42" y2="91.5"/>
    <line x1="26" y1="104.5" x2="42" y2="104.5"/>
  </g>
  <text x="76" y="104" font-family="'PingFang SC','Hiragino Sans GB','Noto Sans CJK SC',sans-serif" font-size="17" font-weight="700"
        fill="#0a9a63" letter-spacing="3" text-anchor="middle">A文한</text>
</svg>
